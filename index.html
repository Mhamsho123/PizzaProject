<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css" />
    <title>Document</title>
</head>
<body>
    <div>
        <div class="title-background">
            <header class="title" id="title"> You are the <span id="creator-text">Creator</span> of your Pizza</header>
        </div>
        <div class="modal" id="modal">
            <button class="modal-close-btn" id="modal-close-btn"disabled>X</button>
            <form id="modal-form">
                <h1 id="modal-title">Sign Up To Our Reward Progam</h1>
                <p id="modal-text">By enetering your email you will be entered into a cash prize system where the value is as endless as your love 
                    pizza.
                </p>
                <div id="modal-email">
                    <label for="modal-email">Email</label>
                    <input class="modal-email" type="email" name="modal-email" aria-label="modal-email">
                </div>
                <div class="modal-choice-btn">
                    <button class="modal-submit-btn" id="modal-submit-btn">Submit</button>
                </div>
            </form>

        </div>
        <div>
            <form class="pizza-form" id="pizza-form">
                <div class="form-name-container">
                    <h1 class="form-title">Create Your Pizza</h1>
                    <label for="name" id="label-name">Enter Name</label>
                    <input 
                    class="name" 
                    id="name" 
                    name="name"
                    aria-label="name"
                    placeholder="John Doe"
                    type="text"
                    required
                    >
                </div>
                <div>
                    <select class="form-options" name="size"required>
                        <option name="" disabled selected>Choose your size</option>
                        <option value="small-size">Small</option>
                        <option value="medium-size">Medium</option>
                        <option value="large-size">Large</option>
                    </select>
                </div>
                <div class="form-checkbox-container">
                    <div>
                        <label for="peporni">Peporni</label>
                        <input type="checkbox" id="peporni" name="peporni">
                        <label for="extra-cheese">Extra Cheese</label>
                        <input type="checkbox" id="extra-cheese" name="extra-cheese">
                        <label for="onions">Onions</label>
                        <input type="checkbox" id="onions" name="onions">
                    </div>
                    <div>
                        <label for="chicken">Chicken</label>
                        <input type="checkbox" id="chicken" name="chicken">
                        <label for="beef">Beef</label>
                        <input type="checkbox" id="beef" name="beef">
                        <label for="buffalo">Buffalo Chicken</label>
                        <input type="checkbox" id="buffalo" name="buffalo">
                    </div>
                </div>
                <div class="form-notes-container">
                    <label for="form-notes">Additonal notes</label>
                    <input type="text" id="form-notes" name="form-notes" class="form-notes" placeholder="">
                </div>
                <button class="form-submit" type="submit">Submit Order</button>
            </form>
        </div>
    </div>

<script src="index.js"></script>
</body>
</html>
